[build]
builder = "nixpacks"

[build.nixpacksConfig]
# Install Chromium system dependencies for Playwright
aptPkgs = ["chromium", "chromium-driver", "libnss3", "libatk-bridge2.0-0", "libdrm2", "libxkbcommon0", "libgbm1"]

[deploy]
startCommand = "playwright install chromium --with-deps && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
